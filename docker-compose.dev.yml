services:
  raccoon-api:
    container_name: raccoon-api-dev
    build: .
    ports:
      - "${PORT:-3001}:3000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./dumpster:/app/dumpster

  caddy:
    image: caddy:latest
    container_name: caddy-dev
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./config/Caddyfile.dev:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./dumpster:/dumpster
    depends_on:
      - raccoon-api

volumes:
  caddy_data:
  caddy_config:

networks:
  raccoon-net:
    driver: bridge