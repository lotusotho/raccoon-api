services:
  raccoon-api:
    container_name: raccoon-api
    image: ghcr.io/lotusotho/raccoon-api:main
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./dumpster:/app/dumpster
    networks:
      - raccoon-net

networks:
  raccoon-net:
    name: raccoon-net
    driver: bridge